{% extends "base.html" %}
{% block title %}Login | Monitorr-II{% endblock %}
{% block extra_head %}
<style>
    body { background-color:#1F1F1F; color:#C8C8C8; font-family: sans-serif; }
    .loginbox {
        max-width: 22rem; margin: 6rem auto; padding: 2rem;
        background: #2a2a2a; border-radius: .75rem;
        box-shadow: 0 .5rem 1.5rem rgba(0,0,0,.5);
    }
    .loginbox h1 { font-size: 1.5rem; text-align: center; margin: 0 0 1.5rem; color: #C8C8C8; }
    .loginbox input[type=password] {
        width:100%; padding:.6rem .8rem; border:1px solid #444; border-radius:.4rem;
        background:#1F1F1F; color:#C8C8C8; font-size:1rem; box-sizing:border-box;
    }
    .loginbox button {
        width:100%; padding:.6rem; margin-top: 1rem;
        background:#680233; color:#fff; border:none; border-radius:.4rem;
        font-size:1rem; cursor:pointer;
    }
    .loginbox .err { color:#ff6b6b; font-size:.85rem; margin-top:.75rem; text-align:center; }
</style>
{% endblock %}
{% block body %}
<div class="loginbox">
    <h1>Monitorr-II</h1>
    <form method="post" action="{{ base_path }}/login">
        <input type="password" name="password" placeholder="password" autofocus required>
        <button type="submit">Sign in</button>
        {% if error %}<div class="err">{{ error }}</div>{% endif %}
    </form>
</div>
{% endblock %}
