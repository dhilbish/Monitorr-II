<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Monitorr">
        <meta name="author" content="Monitorr">
        <meta name="version" content="monitorr-ii">
        <meta name="theme-color" content="#464646">
        <meta name="theme_color" content="#464646">

        <link rel="manifest" href="{{ base_path }}/static/webmanifest.json">
        <link rel="shortcut icon" type="image/x-icon" href="{{ base_path }}/static/favicon.ico" />
        <link rel="apple-touch-icon" href="{{ base_path }}/static/favicon.ico">

        <link href="{{ base_path }}/static/css/bootstrap.min.css" rel="stylesheet">
        <link href="{{ base_path }}/static/css/main.css" rel="stylesheet">

        {% block extra_head %}{% endblock %}

        <title>{% block title %}Monitorr-II{% endblock %}</title>
    </head>
    <body>
        {% block body %}{% endblock %}
    </body>
